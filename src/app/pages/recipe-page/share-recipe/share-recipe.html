<div class="share-recipe">
  <h3 class="share-recipe__title">Поділитись рецептом</h3>
  
  <div class="share-recipe__buttons">
    <!-- Telegram -->

      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.02-1.96 1.25-5.54 3.69-.52.35-.99.53-1.41.52-.46-.01-1.35-.26-2.01-.48-.81-.27-1.45-.42-1.39-.89.03-.25.38-.51 1.07-.78 4.2-1.82 7-3.03 8.4-3.61 4-.1.17.83-.2.83-.02 0-.05.01-.08.01-.03.01-.03.01-.03z"/></svg>
    </button>

    <!-- Facebook -->
    <button class="share-btn facebook" (click)="shareFacebook()" aria-label="Поділитись у Facebook">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.04C6.5 2.04 2 6.53 2 12.06C2 17.06 5.66 21.21 10.44 21.96V14.96H7.9V12.06H10.44V9.85C10.44 7.34 11.93 5.96 14.22 5.96C15.31 5.96 16.45 6.15 16.45 6.15V8.62H15.19C13.95 8.62 13.56 9.39 13.56 10.18V12.06H16.34L15.89 14.96H13.56V21.96C18.34 21.21 22 17.06 22 12.06C22 6.53 17.5 2.04 12 2.04Z"/></svg>
    </button>

    <!-- Viber -->
    <button class="share-btn viber" (click)="shareViber()" aria-label="Поділитись у Viber">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.18 16.92c-.17-.1-.28-.2-.33-.28a.54.54 0 01-.07-.25c0-.1.03-.21.09-.34l.21-.44c.48-1.01.69-1.52.69-2.08a2.53 2.53 0 00-.73-1.83 2.51 2.51 0 00-1.84-.73c-.56 0-1.07.21-2.08.69l-.44.21c-.13.06-.24.09-.34.09a.54.54 0 01-.25-.07.41.41 0 01-.28-.33l-.2-.93c-.15-.69-.22-1.04-.45-1.27a1.32 1.32 0 00-.96-.38 1.34 1.34 0 00-1.26 1.05l-.3 1.15a13.92 13.92 0 00-.09 3.51 14.2 14.2 0 002.3 5.37c.36.5.76.97 1.2 1.41a10.64 10.64 0 003.54 2.37 8.5 8.5 0 001.62.48 1.3 1.3 0 001.38-.85l.41-1.2c.22-.64.12-1.12-.3-1.4l-.94-.58zM21.9 11.23a9.8 9.8 0 00-1.42-3.1 9.92 9.92 0 00-2.43-2.42 9.8 9.8 0 00-3.1-1.42.34.34 0 00-.4.24l-.18.66a.34.34 0 00.24.41 8.7 8.7 0 014.93 4.93.34.34 0 00.41.24l.66-.18a.34.34 0 00.29-.36zm-2.6 0a7.21 7.21 0 00-.95-2.07 7.28 7.28 0 00-1.63-1.62 7.2 7.2 0 00-2.06-.96.34.34 0 00-.41.24l-.17.65a.34.34 0 00.24.41 6.12 6.12 0 013.48 3.48.34.34 0 00.41.24l.65-.17a.34.34 0 00.2-.24.34.34 0 00.25-.96zm-2.5 0a4.63 4.63 0 00-.47-1.03 4.7 4.7 0 00-.81-.81 4.63 4.63 0 00-1.03-.47.34.34 0 00-.42.23l-.15.63a.34.34 0 00.23.42 3.54 3.54 0 012.02 2.02.34.34 0 00.42.23l.63-.15a.34.34 0 00.24-.41z"/></svg>
    </button>

    <!-- Pinterest (Conditional) -->
    @if (image()) {
      <button class="share-btn pinterest" (click)="sharePinterest()" aria-label="Поділитись у Pinterest">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.017 0C5.396 0 .029 5.367.029 11.987c0 5.079 3.158 9.417 7.618 11.162-.105-.949-.199-2.403.041-3.439.219-.937 1.406-5.966 1.406-5.966s-.359-.72-.359-1.782c0-1.668.967-2.914 2.171-2.914 1.023 0 1.518.769 1.518 1.69 0 1.029-.655 2.568-.994 3.995-.283 1.194.599 2.169 1.777 2.169 2.133 0 3.772-2.249 3.772-5.495 0-2.873-2.064-4.882-5.012-4.882-3.414 0-5.418 2.561-5.418 5.207 0 1.031.397 2.138.893 2.738.098.119.112.224.083.345l-.333 1.36c-.053.22-.174.267-.402.161-1.499-.698-2.436-2.889-2.436-4.649 0-3.785 2.75-7.261 7.929-7.261 4.162 0 7.398 2.967 7.398 6.93 0 4.136-2.607 7.464-6.227 7.464-1.216 0-2.359-.631-2.75-1.378l-.748 2.853c-.271 1.043-1.002 2.35-1.492 3.146 1.124.347 2.317.535 3.554.535 6.607 0 11.985-5.365 11.985-11.987C23.97 5.39 18.592.026 11.985.026L12.017 0z"/></svg>
      </button>
    }

    <!-- Copy Link -->
    <div class="copy-wrapper">
      <button class="share-btn copy" (click)="copyLink()" aria-label="Копіювати посилання">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
      </button>
      @if (copied()) {
        <span class="copy-tooltip">Посилання скопійовано!</span>
      }
    </div>
  </div>
</div>
