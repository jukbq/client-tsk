<div class="recipe_title">
  <h1>{{ recipeTitle() }}</h1>
</div>

@if (recipeID()) {
  <app-rating
    [ratingSumInput]="ratingSum()"
    [ratingCountInput]="ratingCount()"
    [recipeID]="recipeID()"
  >
  </app-rating>
}

<div class="image_block">
  @if (mainImageDesktop()) {
    <picture>
      @if (mainImageMobile()) {
        <source media="(max-width: 768px)" [srcset]="mainImageMobile()!" />
      }
      <img
        [ngSrc]="mainImageDesktop()"
        width="1024"
        height="600"
        [alt]="recipeTitle()"
        sizes="(max-width: 768px) 100vw, 80vw"
        priority
        class="main-image"
        (click)="openCurrentImage()"
        ngSkipHydration
      />
    </picture>
  } @else {
    <div class="image-skeleton"></div>
  }
</div>

@if (selectedImage()) {
  <div class="image-backdrop" (click)="closeImage()">
    <div class="image-modal">
      <img [src]="selectedImage()" alt="" (click)="closeImage()" />
      <button class="close-btn" (click)="closeImage(); $event.stopPropagation()" aria-label="Закрити">✕</button>
    </div>
  </div>
}
