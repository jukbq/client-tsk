<div class="fixed-ad" *ngIf="showAd">

          crossorigin="anonymous"></script>

  <!-- Банер -->
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-0683376676562440"
       data-ad-slot="3447321804"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>

  <button class="close" (click)="showAd=false">✕</button>
</div>
