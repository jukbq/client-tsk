<aside
  class="mobile-sticky-ads"
  [class.is-collapsed]="isCollapsed()"
  aria-label="Advertisement">
  <button
    type="button"
    class="mobile-sticky-ads__handle"
    (click)="toggleCollapsed()"
    [attr.aria-expanded]="!isCollapsed()"
    [attr.aria-label]="isCollapsed() ? 'Expand advertisement' : 'Collapse advertisement'">
    <span class="mobile-sticky-ads__handle-mark"></span>
  </button>

  <div class="mobile-sticky-ads__ad-container">
    <ins
      #adSlot
      class="adsbygoogle"
      style="display:block;width:100%;height:100% !important"
      data-ad-client="ca-pub-0683376676562440"
      data-ad-slot="8148566870"
      data-ad-format="horizontal"
      data-full-width-responsive="true">
    </ins>
  </div>
</aside>
